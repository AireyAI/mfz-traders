<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFZ Traders | Welcome</title>
    <meta name="description" content="MFZ Traders — Premium XAUUSD gold trading signals. Enter the arena.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
        }

        /* Video background */
        .video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
        }

        /* Logo */
        .logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            filter: drop-shadow(0 0 30px rgba(0, 229, 204, 0.4)) drop-shadow(0 0 60px rgba(0, 229, 204, 0.2));
            animation: logoPulse 3s ease-in-out infinite;
        }

        @media (min-width: 768px) {
            .logo { width: 220px; height: 220px; }
        }

        /* Enter text */
        .enter-text {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(0, 229, 204, 0.6);
            animation: textPulse 2.5s ease-in-out infinite;
            margin-top: 12px;
        }

        /* Line accent */
        .line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00E5CC, transparent);
            opacity: 0.5;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 229, 204, 0.4)) drop-shadow(0 0 60px rgba(0, 229, 204, 0.2)); }
            50% { filter: drop-shadow(0 0 40px rgba(0, 229, 204, 0.6)) drop-shadow(0 0 80px rgba(0, 229, 204, 0.3)); }
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Transition out */
        .fade-out {
            animation: fadeOut 0.8s ease-in forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(1.05); }
        }
    </style>
</head>
<body onclick="enterSite()">

    <!-- Video background -->
    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Dark overlay -->
    <div class="overlay"></div>

    <!-- Centered content -->
    <div class="content" id="content">
        <img src="brand_assets/logo.png" alt="MFZ Traders" class="logo">
        <div class="line"></div>
        <div class="enter-text">Tap anywhere to enter</div>
    </div>

    <script>
        function enterSite() {
            const content = document.getElementById('content');
            content.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 800);
        }
    </script>
</body>
</html>
